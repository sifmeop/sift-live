logLevel: info
logDestinations: [stdout]

readTimeout: 10s
writeTimeout: 10s

authMethod: http
authHTTPAddress: http://host.docker.internal:5000/api/stream/webhook/auth
authHTTPExclude:
  - action: read

api: yes
apiAddress: :9997
apiAllowOrigins: ["*"]

playback: no

rtmp: yes
rtmpAddress: :1935

srt: no
webrtc: no
moq: no
rtsp: no

hls: yes
hlsAddress: :8888
hlsAllowOrigins: ["*"]
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsPartDuration: 200ms
hlsMuxerCloseAfter: 60s
hlsSegmentMaxSize: 50M

pathDefaults:
  source: publisher
  overridePublisher: yes
  maxReaders: 0

  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 1h

paths:
  all_others:
    runOnReady: curl "${BACKEND_URL}/api/stream/webhook/stream-connect?path=${MTX_PATH}&query=${MTX_QUERY}"
    runOnNotReady: curl "${BACKEND_URL}/api/stream/webhook/stream-disconnect?path=${MTX_PATH}&query=${MTX_QUERY}"
